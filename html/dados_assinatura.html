<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Assinatura</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../img/Icone.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <link rel="stylesheet" href="../css/styles_dados_assinatura.css">

</head>

<body>

<div class="container">

  <h1 class="title">
    Criar Assinatura
  </h1>

  <!-- PROGRESS -->

  <div class="progress">

    <div class="progress-bar" id="progressBar"></div>

    <div class="step active">1</div>
    <div class="step">2</div>
    <div class="step">3</div>

  </div>

  <!-- PASSO 1 -->

  <div class="page active">

    <div class="photo-area">

      <div class="photo">
        <i class="fa-regular fa-image"></i>
      </div>

      <span>Foto</span>

    </div>

    <div class="form-grid">

      <div class="input-box">

        <input
          type="text"
          id="nome"
          placeholder="Nome"
        >

      </div>

      <div class="input-box">

        <input
          type="number"
          id="valor"
          placeholder="Valor"
        >

      </div>

      <div class="input-box">

        <input
          type="date"
          id="dataVencimento"
        >

      </div>

      <div class="input-box">

        <select id="status">

          <option value="0">
            Ativa
          </option>

          <option value="1">
            Pendente
          </option>

          <option value="2">
            Cancelada
          </option>

        </select>

      </div>

      <div class="input-box full">

        <textarea
          id="descricao"
          placeholder="Descrição"
        ></textarea>

      </div>

    </div>

    <div class="buttons">

        <button
        class="btn-back"
        onclick="window.location.href='assinaturas.html'"
        >
            Voltar
        </button>

      <button
        class="btn-next"
        onclick="nextStep()"
      >
        Avançar
      </button>

    </div>

  </div>

  <!-- PASSO 2 -->

  <div class="page">

    <h2 class="subtitle">
      Escolha uma categoria
    </h2>

    <!-- CATEGORIAS DINÂMICAS -->

    <div
      class="options-grid"
      id="listaCategorias"
    ></div>

    <div class="buttons">

      <button
        class="btn-back"
        onclick="prevStep()"
      >
        Voltar
      </button>

      <button
        class="btn-next"
        onclick="nextStep()"
      >
        Finalizar
      </button>

    </div>

  </div>

  <!-- PASSO 3 -->

  <div class="page">

    <div class="success">

      <div class="success-icon">
        ✓
      </div>

      <p>
        Assinatura criada com sucesso
      </p>

    </div>

    <div class="buttons">

      <button
        class="btn-back"
        onclick="prevStep()"
      >
        Voltar
      </button>

    </div>

  </div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/createAssinatura.js"></script>
<script src="../js/login.js" defer></script>

</body>
</html>
