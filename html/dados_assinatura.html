<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados da Assinatura</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles_assinaturas.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">

    <link rel="stylesheet" href="../css/styles_dados_assinatura.css">
    <link rel="stylesheet" href="../css/style_menu.css">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>

    <div class="container">

        <h1 class="title">Dados da Assinatura</h1>

        <div class="steps">
            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
        </div>

        <div class="photo-area">
            <div class="photo">
                <i class="fa-regular fa-image"></i>
            </div>

            <span class="photo-text">Foto</span>
        </div>

        <form>

            <div class="form-grid">

                <div class="input-box">
                    <input type="text" placeholder="Nome">
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Valor">
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Data de vencimento">
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Status">
                </div>

                <div class="input-box full-width">
                    <textarea placeholder="Descrição"></textarea>
                </div>

            </div>

            <div class="buttons">

                <a href="assinaturas.html" class="btn btn-back">
                    Voltar
                </a>

                <a href="categoria_assinatura.html" class="btn btn-next">
                    Avançar
                </a>

            </div>

        </form>

    </div>

</body>

</html>
