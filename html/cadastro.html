<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles_cadastro.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Finity_cadastro</title>

</head>
<body>
    <section class="main">
        <div class="cadastro">
            <div class="card">
                <form>
                <h1>Cadastre-se</h1>
                <div class="input_cadastro">
                    <i class="bi bi-person"></i>
                    <input type="text" placeholder="Nome completo">
                </div>
                
                <div class="input_cadastro">
                    <i class="bi bi-envelope"></i>
                    <input type="email" placeholder="E-mail">
                </div>
                
                <div class="input_cadastro">
                    <i class="bi bi-lock"></i>
                    <input type="password" placeholder="Senha">
                </div>
                
                <div class="input_cadastro">
                    <i class="bi bi-lock"></i>
                    <input type="password" placeholder="Confirmar senha">
                </div>

                <div class="validacao_cadastro">
                        <label>
                        <input type="checkbox">
                        Eu aceito os <a href="#">termos de uso</a> 
                </div>

                <div class="botao_">
                    <button class="botao_cadastro" type="submit">Criar conta</button>
                </div>

                <div class="link_entrar">
                        <p>Já tem uma conta? <a href="../html/login.html">Entrar</a></p>
                </div>
                
                </form>
            </div>
        </div>
    </section>
</body> 
</html>
