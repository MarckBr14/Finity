<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Assinaturas</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../img/Icone.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="../css/styles_assinaturas.css">
    <link rel="stylesheet" href="../css/style_assinaturas.css">
    <link rel="stylesheet" href="../css/style_menu.css">

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="https://unicons.iconscout.com/release/v4.0.0/css/line.css"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- MODAL PAGAMENTO -->
    <!-- ========================= -->

    <div class="modal-overlay" id="modal">

        <div class="modal">

            <h2 id="tituloModal">
                Agendar Pagamento
            </h2>

            <form id="formPagamento">

                <input
                    type="number"
                    id="mesPagamento"
                    placeholder="Mês"
                    min="1"
                    max="12"
                    required
                >

                <input
                    type="number"
                    id="anoPagamento"
                    placeholder="Ano"
                    min="2024"
                    required
                >

                <textarea
                    id="descricaoPagamento"
                    placeholder="Descrição"
                ></textarea>

                <div class="modal-buttons">

                    <button
                        type="button"
                        class="btn-cancelar"
                        onclick="fecharModal()"
                    >
                        Cancelar
                    </button>

                    <button
                        type="submit"
                        id="btnSalvarPagamento"
                    >
                        Agendar
                    </button>

                </div>

            </form>

        </div>

    </div>



    <!-- ========================= -->
    <!-- MODAL SUCESSO -->
    <!-- ========================= -->

    <div class="success-overlay" id="successModal">

        <div class="success-box">

            <div class="check-icon">
                ✓
            </div>

            <p id="textoSucesso">
                Pagamento realizado com sucesso
            </p>

        </div>

    </div>



    <!-- ========================= -->
    <!-- SIDEBAR -->
    <!-- ========================= -->

    <aside class="sidebar">

        <div>

            <!-- LOGO -->

            <div class="logo">

                <div class="logo-box">
                    <img src="../img/Icone.svg" alt="">
                </div>

                <h1>finity</h1>

            </div>

            <div class="divider"></div>



            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard.html">

                    <div class="menu-item">

                        <i class="uil uil-apps"></i>

                        <span>Dashboard</span>

                    </div>

                </a>



                <a href="usuario.html" id="menuUsuarios">

                    <div class="menu-item">

                        <i class="uil uil-users-alt"></i>

                        <span>Usuários</span>

                    </div>

                </a>



                <a href="assinaturas.html">

                    <div class="menu-item active">

                        <i class="uil uil-file-edit-alt"></i>

                        <span>Assinaturas</span>

                    </div>

                </a>



                <a href="categoria.html">

                    <div class="menu-item">

                        <i class="fa-solid fa-layer-group"></i>

                        <span>Categorias</span>

                    </div>

                </a>



                <a href="departamento.html">

                    <div class="menu-item">

                        <i class="fa-solid fa-code-branch"></i>

                        <span>Departamentos</span>

                    </div>

                </a>

            </nav>

        </div>



        <!-- FOOTER -->

        <div class="footer">

            <div class="progress-area">

                <h3>Finalizando Mês em</h3>

                <span id="textoMes">
                    0 dias
                </span>

                <div class="progress-bar">

                    <div
                        class="progress"
                        id="barraMes"
                    ></div>

                </div>

            </div>



            <div class="menu-item">

                <i class="fa-solid fa-gear"></i>

                <span>Configurações</span>

            </div>



            <div
                class="menu-item"
                onclick="logout()"
            >

                <i class="fa-solid fa-right-from-bracket"></i>

                <span>Sair</span>

            </div>



            <div class="bottom-divider"></div>



            <!-- PROFILE -->

            <div class="profile">

                <img
                    src="https://i.pravatar.cc/100"
                    alt=""
                >

                <div class="profile-info">

                    <h4 id="nomeUsuario">
                        Usuário
                    </h4>

                    <p id="emailUsuario">
                        email@email.com
                    </p>

                </div>

            </div>

        </div>

    </aside>



    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->

    <main>

        <h1>Assinaturas</h1>



        <!-- CARDS TOPO -->

        <section class="cards">

            <div class="top-card">

                <div class="icon-card">
                    <i class="uil uil-wallet"></i>
                </div>

                <div>

                    <h3 id="totalAssinaturas">
                        0
                    </h3>

                    <p>Total de Assinaturas</p>

                </div>

            </div>



            <div class="top-card">

                <div class="icon-card">
                    <i class="uil uil-check-circle"></i>
                </div>

                <div>

                    <h3 id="assinaturasAtivas">
                        0
                    </h3>

                    <p>Ativas</p>

                </div>

            </div>



            <div class="top-card">

                <div class="icon-card">
                    <i class="uil uil-comment"></i>
                </div>

                <div>

                    <h3 id="assinaturasPendentes">
                        0
                    </h3>

                    <p>Pendentes</p>

                </div>

            </div>

        </section>



        <!-- SEARCH -->

        <div class="top-actions">

            <div class="search-box">

                <i class="uil uil-search"></i>

                <input
                    type="text"
                    id="buscarAssinatura"
                    placeholder="Buscar assinatura..."
                >

            </div>



            <div class="btn">

                <a href="dados_assinatura.html">
                    + Nova Assinatura
                </a>

            </div>

        </div>



        <!-- GRID -->
        <section
            class="grid-assinaturas"
            id="gridAssinaturas"
        ></section>
    </main>



    <!-- JS -->
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/assinatura.js"></script>
    <script src="../js/login.js" defer></script>

</body>

</html>
