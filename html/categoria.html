<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Categoria</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../img/Icone.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style_categoria.css">
    <link rel="stylesheet" href="../css/style_menu.css">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet"
        href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">

    <!-- JS -->
    <script src="../js/model.js" defer></script>
</head>

<body>

    <!-- MODAL FORMULÁRIO -->
    <div class="modal-overlay" id="modal">

        <div class="modal">

            <h2>Nova Categoria</h2>

            <div class="upload-area">

                <div class="upload-circle">
                    📷
                </div>

                <span>Foto</span>

            </div>

            <form id="form">

                <input type="text"
                    id="nomeCategoria"
                    placeholder="Nome">

                <textarea id="descricaoCategoria"
                    placeholder="Descrição"></textarea>

                <button type="submit"
                    id="btnSalvarCategoria">
                    Adicionar
                </button>

            </form>

        </div>

    </div>

    <!-- MODAL SUCESSO -->
    <div class="success-overlay" id="successModal">

        <div class="success-box">

            <div class="check-icon">
                ✓
            </div>

            <p>Categoria criada com sucesso</p>

        </div>

    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div>

            <!-- LOGO -->
            <div class="logo">

                <div class="logo-box">
                    <img src="../img/Icone.svg" alt="Logo">
                </div>

                <h1>finity</h1>

            </div>

            <div class="divider"></div>

            <!-- MENU -->
            <nav class="menu">

                <a href="dashboard.html">
                    <div class="menu-item">
                        <i class="uil uil-apps"></i>
                        <span>Dashboard</span>
                    </div>
                </a>

                <a href="usuario.html" id="menuUsuarios">              
                        <div class="menu-item">
                            <i class="uil uil-users-alt"></i>
                            <span>Usuários</span>
                        </div>
                </a>

                <a href="assinaturas.html">
                    <div class="menu-item">
                        <i class="uil uil-file-edit-alt"></i>
                        <span>Assinaturas</span>
                    </div>
                </a>

                <a href="categoria.html">
                    <div class="menu-item active">
                        <i class="fa-solid fa-layer-group"></i>
                        <span>Categorias</span>
                    </div>
                </a>

                <a href="departamento.html">
                    <div class="menu-item">
                        <i class="fa-solid fa-code-branch"></i>
                        <span>Departamentos</span>
                    </div>
                </a>

            </nav>

        </div>

        <!-- FOOTER -->
        <div class="footer">

            <div class="progress-area">

                <h3>Finalizando mês em</h3>

                <span id="textoMes">7 dias (93%)</span>

                <div class="progress-bar">
                    <div class="progress" id="barraMes"></div>
                </div>

            </div>

            <div class="menu-item">
                <i class="fa-solid fa-gear"></i>
                <span>Configurações</span>
            </div>

            <a href="login.html">

                <div class="menu-item">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span>
                </div>

            </a>

            <div class="bottom-divider"></div>

            <!-- PROFILE -->
            <div class="profile">

                <img src="https://i.pravatar.cc/100"
                    alt="Foto de perfil">

                <div class="profile-info">
                    <h4 id="nomeUsuario">Mariene Barbosa</h4>
                    <p id="emailUsuario">
                        marienebarbosa@gmail.com
                    </p>
                </div>

            </div>

        </div>

    </aside>

    <!-- MAIN -->
    <main>

        <div class="header">

            <div class="text">
                <h1>Categorias</h1>
                <p>Gerencie suas categorias aqui</p>
            </div>

            <button onclick="abrirModal()" class="btn">
                <i class="fa-solid fa-plus"></i>
                Nova Categoria
            </button>

        </div>

        <!-- GRID DE CARDS -->
        <div class="grid-cards" id="listaCategorias">
        </div>

    </main>

    <!-- JS -->
    <script src="../js/auth.js"></script>
    <script src="../js/categoria.js"></script>
    <script src="../js/menu.js" defer></script>

</body>

</html>
