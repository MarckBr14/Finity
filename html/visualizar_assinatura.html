<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../img/Icone.svg" />

    <title>Visualizar assinatura</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/visualizar_assinatura.css" />
    <link rel="stylesheet" href="../css/style_menu.css" />

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link
        rel="stylesheet"
        href="https://unicons.iconscout.com/release/v4.0.0/css/line.css"
    />
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div>

            <!-- LOGO -->
            <div class="logo">

                <div class="logo-box">
                    <img src="../img/Icone.svg" alt="Logo finity" />
                </div>

                <h1>finity</h1>

            </div>

            <div class="divider"></div>

            <!-- MENU -->
            <nav class="menu">

                <a href="dashboard.html">

                    <div class="menu-item">
                        <i class="uil uil-apps"></i>
                        <span>Dashboard</span>
                    </div>

                </a>

                <a href="usuario.html">

                    <div class="menu-item">
                        <i class="uil uil-users-alt"></i>
                        <span>Usuários</span>
                    </div>

                </a>

                <a href="assinaturas.html">

                    <div class="menu-item active">
                        <i class="uil uil-file-edit-alt"></i>
                        <span>Assinaturas</span>
                    </div>

                </a>

                <a href="categoria.html">

                    <div class="menu-item">
                        <i class="fa-solid fa-layer-group"></i>
                        <span>Categorias</span>
                    </div>

                </a>

                <a href="departamento.html">

                    <div class="menu-item">
                        <i class="fa-solid fa-code-branch"></i>
                        <span>Departamentos</span>
                    </div>

                </a>

            </nav>

        </div>

        <!-- FOOTER -->
        <div class="footer">

            <a href="login.html">

                <div class="menu-item">

                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span>

                </div>

            </a>

            <div class="bottom-divider"></div>

            <!-- PROFILE -->
            <div class="profile">

                <img
                    src="https://i.pravatar.cc/100"
                    alt="Foto de perfil"
                />

                <div class="profile-info">

                    <h4 id="nomeUsuario">Usuário</h4>
                    <p id="emailUsuario">email@email.com</p>

                </div>

            </div>

        </div>

    </aside>

    <!-- MAIN -->
    <main>

        <a href="assinaturas.html">
            <i class="uil uil-left-arrow-to-left"></i>
        </a>

        <div class="subscription-header">

            <div class="brand-logo">

                <div class="netflix-icon" id="logoAssinatura">
                    N
                </div>

            </div>

            <div class="brand-details">

                <h2 id="nomeAssinatura">Carregando...</h2>

                <p>
                    Valor -
                    <span id="valorAssinatura">
                        R$ 0,00
                    </span>
                </p>

            </div>

        </div>

        <div class="info-container">

            <h3>Informações</h3>

            <div class="info-grid">

                <div class="form-group">

                    <label>Nome</label>

                    <input
                        type="text"
                        id="inputNome"
                        disabled
                    />

                </div>

                <div class="form-group">

                    <label>Valor</label>

                    <input
                        type="text"
                        id="inputValor"
                        disabled
                    />

                </div>

                <div class="form-group">

                    <label>Data de criação</label>

                    <input
                        type="text"
                        id="inputCriacao"
                        disabled
                    />

                </div>

                <div class="form-group">

                    <label>Data de vencimento</label>

                    <input
                        type="text"
                        id="inputVencimento"
                        disabled
                    />

                </div>

                <div class="form-group">

                    <label>Categoria</label>

                    <input
                        type="text"
                        id="inputCategoria"
                        disabled
                    />

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <input
                        type="text"
                        id="inputStatus"
                        disabled
                    />

                </div>

                <div class="form-group">

                    <label>Descrição</label>

                    <input
                        type="text"
                        id="inputDescricao"
                        disabled
                    />

                </div>

            </div>

            <div class="actions-group">

                <button class="btn btn-edit">
                    Editar
                </button>

                <button class="btn btn-pay">
                    Pagar
                </button>

            </div>

        </div>

    </main>

    <!-- API -->
    <script src="../js/api.js"></script>

    <!-- AUTH -->
    <script src="../js/auth.js"></script>

    <script>

        // =========================
        // USUÁRIO
        // =========================

        const usuario = JSON.parse(
            localStorage.getItem("usuario")
        );

        document.getElementById("nomeUsuario").innerText =
            usuario.nome;

        document.getElementById("emailUsuario").innerText =
            usuario.email;


        // =========================
        // ID DA URL
        // =========================

        const params = new URLSearchParams(
            window.location.search
        );

        const id = params.get("id");


        // =========================
        // CARREGAR ASSINATURA
        // =========================

        async function carregarAssinatura() {

            const token =
                localStorage.getItem("token");

            try {

                const response = await fetch(
                    `${API_URL}/assinatura/${id}`,
                    {
                        method: "GET",

                        headers: {
                            "Authorization":
                                `Bearer ${token}`,
                            "Content-Type":
                                "application/json"
                        }
                    }
                );

                const assinatura =
                    await response.json();

                console.log(assinatura);

                // topo
                document.getElementById(
                    "logoAssinatura"
                ).innerText =
                    assinatura.nome.charAt(0);

                document.getElementById(
                    "nomeAssinatura"
                ).innerText =
                    assinatura.nome;

                document.getElementById(
                    "valorAssinatura"
                ).innerText =
                    (assinatura.valor ?? 0)
                    .toLocaleString("pt-BR", {
                        style: "currency",
                        currency: "BRL"
                    });

                // inputs
                document.getElementById(
                    "inputNome"
                ).value =
                    assinatura.nome;

                document.getElementById(
                    "inputValor"
                ).value =
                    (assinatura.valor ?? 0)
                    .toLocaleString("pt-BR", {
                        style: "currency",
                        currency: "BRL"
                    });

                document.getElementById(
                    "inputCriacao"
                ).value =
                    formatarData(
                        assinatura.dataCriacao
                    );

                document.getElementById(
                    "inputVencimento"
                ).value =
                    formatarData(
                        assinatura.dataVencimento
                    );

                document.getElementById(
                    "inputCategoria"
                ).value =
                    assinatura.categoria?.nome ?? "";

                document.getElementById(
                    "inputStatus"
                ).value =
                    assinatura.status;

                document.getElementById(
                    "inputDescricao"
                ).value =
                    assinatura.descricao ?? "";

            } catch (erro) {

                console.log(erro);

                alert(
                    "Erro ao carregar assinatura"
                );

            }
        }


        // =========================
        // FORMATAR DATA
        // =========================

        function formatarData(data) {

            return new Date(data)
                .toLocaleDateString("pt-BR");

        }


        carregarAssinatura();

    </script>

</body>

</html>
