<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles_login.css">
    <title>Finity_login</title>
</head>
<body>
    <section class="main">
        <div class="left">
        </div>

        <div class="right">
            <div class="curva"></div>
            <form>
                    <h1>Bem-Vindo</h1>
                    <h6>Acesse sa conta para continuar</h6>
                    <div class="input-box">
                        <i class="bi bi-envelope"></i>
                        <input placeholder="E-mail" type="email">
                        
                    </div>
                    <div class="input-box">
                        <i class="bi bi-lock"></i>
                        <input placeholder="senha" type="password">
                        
                    </div>
    
                    <div class="validacao">
                        <label>
                        <input type="checkbox">
                        Lembre de mim 
                        </label>
                        <a href="#">Esqueci a senha</a>
                    </div>
    
                    <div class="login">
                        <button type="submit">ENTRAR</button>
                    </div>
                    <div class="registro_link">
                        <p>Não tem conta? <a href="../html/cadastro.html">Criar agora</a></p>
                    </div>
                </form>
        </div>
    </section>
</body>
</html>
